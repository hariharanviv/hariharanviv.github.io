<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Academic Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="site-title">Your Name — Research & Publications</h1>
      <nav class="main-nav" aria-label="Main navigation">
        <button data-md="about.md" class="nav-link">About</button>
        <button data-md="publications.md" class="nav-link">Publications</button>
        <button data-md="cvs/cv.md" class="nav-link">CV</button>
        <button data-md="blog/index.md" class="nav-link">Blog</button>
        <button id="theme-toggle">🌙 Dark</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <aside class="sidebar">
      <section class="profile-card">
        <div class="avatar-wrap">
          <img id="profile-pic" src="avatar.jpg" alt="Your Name" class="avatar-img" onerror="this.style.display='none'">
          <div class="avatar-initials" aria-hidden="true">YN</div>
        </div>
        <h2>Your Name</h2>
        <p class="position">Position • Institution</p>
        <div id="tidbit" class="tidbit">
          <strong class="tidbit-title">Tidbit</strong>
          <p class="tidbit-text">Add a short personal sentence in <code>tidbit.md</code>.</p>
        </div>
      </section>
      <section class="contact">
        <h3>Contact</h3>
        <p>Email: <a href="mailto:you@example.com">you@example.com</a></p>
      </section>
    </aside>

    <section id="content" class="content" tabindex="0">
      <p class="loading">Loading content…</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© Your Name — Generated: May 2026</small>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
