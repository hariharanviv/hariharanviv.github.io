<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Academic Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1 class="site-title">Vivek Hariharan — Research & Publications</h1>
      <nav class="main-nav" aria-label="Main navigation">
        <button data-md="about.md" class="nav-link">About</button>
        <button data-md="publications.md" class="nav-link">Publications</button>
        <button data-md="cvs/cv.md" class="nav-link">CV</button>
        <button data-md="blog/index.md" class="nav-link">Blog</button>
        <button id="theme-toggle">🌙 Dark</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <aside class="sidebar">
      <section class="profile-card">
        <div class="avatar-wrap">
          <img id="profile-pic" src="avatar.jpg" alt="Vivek Hariharan" class="avatar-img" onerror="this.style.display='none'">
          <div class="avatar-initials" aria-hidden="true">VH</div>
        </div>
        <h2>Vivek Hariharan</h2>
        <p class="position">PhD Student • Johns Hopkins University</p>
        <div id="tidbit" class="tidbit">
          <strong class="tidbit-title">Tidbit</strong>
          <p class="tidbit-text">Add a short personal sentence in <code>tidbit.md</code>.</p>
        </div>
      </section>
      <section class="social-section">
        <h3>Connect</h3>
        <div class="social-links" aria-label="Social links">
          <a class="social" href="mailto:hariharanviv@gmail.com" aria-label="Email"><img src="assets/icon-email.svg" alt="Email" /></a>
          <a class="social" href="https://x.com/hariharanviv" target="_blank" rel="noopener" aria-label="X"><img src="assets/icon-x.svg" alt="X" /></a>
          <a class="social" href="https://scholar.google.com/citations?user=8-v4nJgAAAAJ&hl=en" target="_blank" rel="noopener" aria-label="Google Scholar"><img src="assets/icon-scholar.svg" alt="Google Scholar" /></a>
          <a class="social" href="https://orcid.org/0009-0000-7001-0077" target="_blank" rel="noopener" aria-label="ORCID"><img src="assets/icon-orcid.svg" alt="ORCID" /></a>
          <a class="social" href="https://github.com/hariharanviv" target="_blank" rel="noopener" aria-label="GitHub"><img src="assets/icon-github.svg" alt="GitHub" /></a>
        </div>
      </section>
    </aside>

    <section id="content" class="content" tabindex="0">
      <p class="loading">Loading content…</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© Vivek Hariharan — Generated: May 2026</small>
    </div>
  </footer>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

  <script src="app.js"></script>
</body>
</html>
